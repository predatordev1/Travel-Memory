---
- name: frontend setup
  hosts: frontend
  become: true

  tasks:
    - name: Creation of .env file
      ansible.builtin.copy:
        dest: /home/ubuntu/TravelMemory/frontend/.env
        content: |
          REACT_APP_BACKEND_URL={{ REACT_APP_BACKEND_URL }}

    - name: Find and replace text
      ansible.builtin.replace:
        path: /home/ubuntu/TravelMemory/frontend/src/url.js
        regexp: 'localhost'        
        replace: '{{ backend_ip }}'

    - name: npm installation
      ansible.builtin.command:
        chdir: /home/ubuntu/TravelMemory/frontend
        cmd: /usr/bin/npm install

    - name: Install pm2 globally     
      ansible.builtin.command:
        cmd: npm install -g pm2

    - name: Start frontend with pm2
      ansible.builtin.command:
        cmd: pm2 start npm --name "frontend" -- start
        chdir: /home/ubuntu/TravelMemory/frontend



